<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .area {
            border: 1px solid #333;
            width: 300px;
            min-height: 50px;
            padding: 8px;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <h1>DOM 요소에 접근하기</h1>

    <h3>1) 아이디로 접근 - getElementById("아이디")</h3>
    <div class="area", id="area1"></div>
    <button onclick="accessId();">아이디로 접근</button>

    <script>
        function accessId() {
            const area1 = document.getElementById("area1");
            area1.style.background = "yellow";  // 인라인 방식으로 변경되어 그리 좋지 않다
            area1.textContent = 'area1 클릭됨';
        }
    </script>

    <br><br>

    <h3>2) 태그명으로 접근 - getElementsByTagName(태그명)</h3>
    <ul>
        <li>li태그로 작성</li>
        <li>li태그로 작성</li>
        <li>li태그로 작성</li>
    </ul>
    <button onclick="accessTag();">태그로 접근</button>
    <script>
        function accessTag() {
            // 태그명으로 가져오는 요소는 여러 개 일 수 있다.
            const liList = document.getElementsByTagName('li');
            console.log("개수 : " + liList.length);
            for (let i = 0; i < liList.length; i++) {
                liList[i].textContent = i + '번째 li';
            }
        }
    </script>

    <br><br>

    <h3>3) 선택자로 접근 - querySelector(선택자) / querySelectorAll(선택자)</h3>
    <div id="tmp1">테스트 입니다.</div>
    <p class="item">항목 A</p>
    <p class="item">항목 B</p>
    <p class="item">항목 C</p>
    <button onclick="accessSelector();">선택자로 접근</button>

    <script>
        function accessSelector() {
            // document.querySelector();    // 조건에 맞는 요소 한 개(없으면 Null, 조건에 여러 개가 부합해도 첫번째 값 하나만 가져옴)
            const one = document.querySelector("#tmp1");
            console.log(one);
            one.style.fontWeight = 'bold';

            // document.querySelectorAll(); // 조건에 맞는 요소 전부를 가져옴, NodeList타입으로, 없으면 빈 목록)
            const all = document.querySelectorAll('.item');
            console.log(all);
            all.forEach(function(e,i) {
                console.log(e, i);
                e.style.color = 'red';
            });

            console.log(document.querySelector('#none'));       // Null
            
            console.log(document.querySelectorAll('#none'));    // NodeList[] = 빈 NodeList
        }
    </script>
</body>
</html>
